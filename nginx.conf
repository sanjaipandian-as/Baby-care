# Production Nginx Server Configuration Snippet
# Web Performance & Core Web Vitals Optimization

server {
    listen 80;
    listen [::]:80;
    server_name example.com;
    root /var/www/html;
    index baby-workshop-clone.html index.html;

    # 1. GZIP & BROTLI COMPRESSION
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Brotli Compression (if ngx_brotli module enabled)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # 2. IMMUTABLE ASSET CACHING (1 YEAR)
    location ~* \.(avif|webp|png|jpe?g|svg|mp4|woff2|css|js)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # 3. HTML MUST REVALIDATE
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # 4. SECURITY HEADERS
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
